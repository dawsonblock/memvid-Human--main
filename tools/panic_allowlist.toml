# tools/panic_allowlist.toml
#
# Approved production panic sites for memvid-core.
#
# Schema per entry:
#   [[allow]]
#   id               = "<unique-kebab-case>"
#   file             = "src/..."   # exact repo-relative path (required unless global = true)
#   global           = true        # omit or set false for per-file entries
#   kind             = "unwrap" | "expect" | "panic" | "todo" | "unimplemented" | "unreachable" | "*"
#   snippet_contains = "..."       # literal substring that must appear in the source line
#   rationale        = "..."       # why runtime input cannot trigger this panic
#   remediation      = "..."       # how to remove this entry in future
#
# Engine: scripts/audit_panics.py
# A finding (file, kind, source-line) is allowlisted when:
#   entry.kind == finding.kind  OR  entry.kind == "*"
#   AND entry.snippet_contains  is a substring of the source line
#   AND (entry.global == true   OR  entry.file == finding.file)
# ---------------------------------------------------------------------------
# ===========================================================================
# GLOBAL entries (apply to every file)
# ===========================================================================

[[allow]]
id               = "global-regex-new-literal"
global           = true
kind             = "unwrap"
snippet_contains = "Regex::new("
rationale        = "Regex::new() on a compile-time string literal panics only if the regex syntax is invalid; the literal is reviewed at code-review time and never changes at runtime."
remediation      = "Replace with a OnceLock<Regex> or LazyLock<Regex> initialised from a const if the regex is truly static, then remove this entry."

# ===========================================================================
# src/analysis/temporal.rs
# ===========================================================================

[[allow]]
id               = "temporal-regex-literal-expect"
file             = "src/analysis/temporal.rs"
kind             = "expect"
snippet_contains = ".expect(\"regex literal\")"
rationale        = "Regex compiled from a string literal embedded in source; cannot fail at runtime unless the source literal is edited."
remediation      = "Use LazyLock<Regex> and remove the expect."

[[allow]]
id               = "temporal-from-calendar-date"
file             = "src/analysis/temporal.rs"
kind             = "unwrap"
snippet_contains = "from_calendar_date("
rationale        = "Calendar date is constructed from constants or values already validated by the calling code path; invalid dates cannot reach this call."
remediation      = "Return a Result from the function and propagate the error."

[[allow]]
id               = "temporal-from-ymd-opt"
file             = "src/analysis/temporal.rs"
kind             = "unwrap"
snippet_contains = "from_ymd_opt("
rationale        = "Year/month/day values are pre-validated before this call; None is structurally impossible here."
remediation      = "Return a Result from the function and propagate the error."

[[allow]]
id               = "temporal-checked-add-delta"
file             = "src/analysis/temporal.rs"
kind             = "unwrap"
snippet_contains = "checked_add("
rationale        = "Delta is a constant small value; overflow into checked arithmetic is structurally impossible for real dates."
remediation      = "Return a Result and propagate."
[[allow]]
id               = "temporal-month-try-from"
file             = "src/analysis/temporal.rs"
kind             = "unwrap"
snippet_contains = "Month::try_from("
rationale        = "Month value is computed from a modulo-12 expression; TryFrom cannot return Err for values 1-12 produced by the adjusted range."
remediation      = "Use a match arm or const mapping instead."

[[allow]]
id               = "temporal-time-from-hms"
file             = "src/analysis/temporal.rs"
kind             = "unwrap"
snippet_contains = "Time::from_hms("
rationale        = "Hours/minutes/seconds are constants (0, 0, 0); cannot fail."
remediation      = "Inline Time::MIDNIGHT constant if available in the version of time crate in use."

[[allow]]
id               = "temporal-token-parse"
file             = "src/analysis/temporal.rs"
kind             = "unwrap"
snippet_contains = "token.parse().unwrap()"
rationale        = "Token is matched by a regex that asserts only ASCII digit characters; parse::<i32> cannot fail on a non-empty all-digit string."
remediation      = "Use parse::<i32>().unwrap_or(0) or propagate the error."

[[allow]]
id               = "temporal-first-business-day-unreachable"
file             = "src/analysis/temporal.rs"
kind             = "unreachable"
snippet_contains = "_ => unreachable!()"
rationale        = "The match arm guard covers all Month variants; the wildcard arm is structurally unreachable given exhaustive prior arms."
remediation      = "Verify exhaustiveness with a compile-time check or remove the wildcard after confirming all variants are handled."

