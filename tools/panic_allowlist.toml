# ---------------------------------------------------------------------------
[[allow]]
id = "parse-year-digits"
snippet_contains = "token.parse().unwrap()"
rationale = "token is a regex capture constrained to \\d{4}; the parse cannot fail"
remediation = "No action required"

# ---------------------------------------------------------------------------
