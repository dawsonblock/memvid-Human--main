id = "guarded-next-unwrap"
snippet_contains = ".expect(\"clauses.len() == 1\")"
rationale = "Guarded by an explicit clauses.len() == 1 check in the same if-branch"
remediation = "No action required"

# ---------------------------------------------------------------------------
